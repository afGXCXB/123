<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер - Аудио и Видео звонки</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0efe9;
            --border: rgba(0,0,0,0.1);
            --border2: rgba(0,0,0,0.18);
            --text: #1a1a18;
            --text2: #6b6b66;
            --text3: #9e9e97;
            --accent: #534AB7;
            --accent-dark: #3C3489;
            --accent-light: #EEEDFE;
            --green: #1D9E75;
            --red: #E24B4A;
            --radius: 12px;
            --radius-sm: 8px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a18;
                --surface: #242422;
                --surface2: #2e2e2b;
                --border: rgba(255,255,255,0.1);
                --border2: rgba(255,255,255,0.18);
                --text: #f0efe9;
                --text2: #a0a09a;
                --text3: #6b6b66;
                --accent-light: #2a2660;
            }
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 700px;
            height: calc(100vh - 32px);
            max-height: 700px;
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 40px rgba(0,0,0,0.08);
            position: relative;
        }

        .header {
            padding: 14px 18px;
            border-bottom: 0.5px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo svg { width: 18px; height: 18px; }

        .header-info { flex: 1; min-width: 0; }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .header-status {
            font-size: 12px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text3);
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .dot.on { background: var(--green); }
        .dot.err { background: var(--red); }

        .call-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        .call-btn {
            background: var(--surface);
            border: 0.5px solid var(--border2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            color: var(--text);
        }
        .call-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .call-btn.active {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }
        .call-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .setup {
            padding: 10px 18px;
            border-bottom: 0.5px solid var(--border);
            background: var(--surface2);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .setup label {
            font-size: 12px;
            color: var(--text2);
            white-space: nowrap;
        }

        .setup input {
            flex: 1;
            min-width: 80px;
            border: 0.5px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 13px;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.15s;
        }

        .setup input:focus { border-color: var(--accent); }

        .join-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .join-btn:hover { background: var(--accent-dark); }

        .room-hint {
            padding: 6px 18px;
            font-size: 11px;
            color: var(--text3);
            background: var(--surface2);
            border-bottom: 0.5px solid var(--border);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .room-hint.visible { display: flex; }

        .copy-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .sys-msg {
            text-align: center;
            font-size: 12px;
            color: var(--text3);
            padding: 2px 0;
            user-select: none;
        }

        .msg-group { display: flex; flex-direction: column; }
        .msg-group.me { align-items: flex-end; }
        .msg-group.them { align-items: flex-start; }

        .msg-name {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 3px;
            padding: 0 4px;
        }

        .bubble {
            max-width: 72%;
            padding: 9px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
        }

        .bubble.me {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bubble.them {
            background: var(--surface2);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 0.5px solid var(--border);
        }

        .msg-time {
            font-size: 11px;
            color: var(--text3);
            margin-top: 3px;
            padding: 0 4px;
        }

        .call-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .call-modal.active {
            display: flex;
        }
        .call-video-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .remote-video {
            width: 100%;
            max-width: 500px;
            background: #000;
            border-radius: 12px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            background: #000;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border: 2px solid var(--accent);
            cursor: pointer;
        }
        .call-controls {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--surface);
            width: 100%;
            justify-content: center;
        }
        .call-control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .call-control-btn.hangup {
            background: var(--red);
            color: white;
        }
        .call-control-btn.mute {
            background: var(--surface2);
            color: var(--text);
        }
        .call-control-btn.mute.active {
            background: var(--accent);
            color: white;
        }
        .call-control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .incoming-call {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            z-index: 1001;
            box-shadow: 0 4px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }
        .incoming-call.active {
            display: flex;
        }
        .incoming-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .incoming-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
        }
        .accept-call {
            background: var(--green);
            color: white;
        }
        .reject-call {
            background: var(--red);
            color: white;
        }

        .input-area {
            padding: 10px 14px;
            border-top: 0.5px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .msg-input {
            flex: 1;
            border: 0.5px solid var(--border2);
            border-radius: 20px;
            padding: 9px 16px;
            font-size: 14px;
            color: var(--text);
            background: var(--surface2);
            outline: none;
            resize: none;
            min-height: 38px;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.4;
            transition: border-color 0.15s;
        }
        .msg-input:focus { border-color: var(--accent); }
        .msg-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }
        .send-btn:hover { background: var(--accent-dark); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: var(--surface2); cursor: not-allowed; }

        .send-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }
        .send-btn:disabled svg { fill: var(--text3); }

        .emoji-bar {
            padding: 0 14px 8px;
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .emoji-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 4px;
            transition: background 0.1s;
        }
        .emoji-btn:hover { background: var(--surface2); }

        @media (max-width: 500px) {
            body { padding: 0; }
            .app { max-height: 100vh; height: 100vh; border-radius: 0; border: none; }
            .local-video { width: 80px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </div>
        <div class="header-info">
            <div class="header-title" id="headerTitle">Мессенджер</div>
            <div class="header-status">
                <span class="dot" id="dot"></span>
                <span id="statusText">Не в сети</span>
            </div>
        </div>
        <div class="call-buttons">
            <button class="call-btn" id="audioCallBtn" onclick="startCall('audio')">
                <svg viewBox="0 0 24 24"><path d="M3 10a9 9 0 0 1 18 0v1c0 1.5-.5 3-1.5 4.5-1 1.5-2.5 2.5-4 3.5-1 .5-2 1-3 1.5-1 .5-2 .5-3 0-1-.5-2-1-3-1.5-1.5-1-3-2-4-3.5C3.5 14 3 12.5 3 11v-1z"/><circle cx="12" cy="11" r="3"/></svg>
                <span>Аудио</span>
            </button>
            <button class="call-btn" id="videoCallBtn" onclick="startCall('video')">
                <svg viewBox="0 0 24 24"><path d="M23 7l-5 5 5 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                <span>Видео</span>
            </button>
        </div>
    </div>

    <div class="setup">
        <label>Имя:</label>
        <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="30">
        <label>Комната:</label>
        <input type="text" id="roomInput" placeholder="ID комнаты" maxlength="20">
        <button class="join-btn" id="joinBtn">Войти</button>
    </div>

    <div class="room-hint" id="roomHint">
        <span>📋 Комната: <strong id="hintRoom"></strong></span>
        <button class="copy-btn" onclick="copyRoom()">копировать ID</button>
    </div>

    <div class="messages" id="messages">
        <div class="sys-msg">👋 Добро пожаловать! Введите имя и ID комнаты выше.<br>Оба собеседника должны ввести одинаковый ID комнаты.</div>
    </div>

    <div class="emoji-bar">
        <button class="emoji-btn" onclick="insertEmoji('😊')">😊</button>
        <button class="emoji-btn" onclick="insertEmoji('👍')">👍</button>
        <button class="emoji-btn" onclick="insertEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="insertEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="insertEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="insertEmoji('👋')">👋</button>
        <button class="emoji-btn" onclick="insertEmoji('🎉')">🎉</button>
        <button class="emoji-btn" onclick="insertEmoji('😢')">😢</button>
    </div>

    <div class="input-area">
        <textarea class="msg-input" id="msgInput" placeholder="Напишите сообщение... (Enter — отправить)" rows="1" disabled></textarea>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMsg()">
            <svg viewBox="0 0 24 24">
                <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <div class="call-modal" id="callModal">
        <div class="call-video-container">
            <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
            <video class="local-video" id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="call-control-btn mute" id="muteBtn" onclick="toggleMute()">
                <svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="21"/></svg>
            </button>
            <button class="call-control-btn hangup" onclick="hangUp()">
                <svg viewBox="0 0 24 24"><path d="M12 9a4 4 0 0 0-4 4v3H6v-3a6 6 0 0 1 12 0v3h-2v-3a4 4 0 0 0-4-4z"/></svg>
            </button>
            <button class="call-control-btn" id="videoToggleBtn" onclick="toggleVideo()" style="display: none;">
                <svg viewBox="0 0 24 24"><path d="M23 7l-5 5 5 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
        </div>
    </div>

    <div class="incoming-call" id="incomingCall">
        <div>
            <strong id="callerName"></strong> звонит...
        </div>
        <div class="incoming-buttons">
            <button class="accept-call" onclick="acceptCall()">Ответить</button>
            <button class="reject-call" onclick="rejectCall()">Отклонить</button>
        </div>
    </div>
</div>

<script>
    let client = null;
    let currentRoom = null;
    let myName = 'Аноним';
    let myId = Math.random().toString(36).slice(2, 10);
    let roomUsers = new Map();
    
    let peerConnection = null;
    let localStream = null;
    let callType = null;
    let isInCall = false;
    let pendingCall = null;
    let currentCallPartner = null;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' }
        ]
    };

    const adj = ['Весёлый','Быстрый','Умный','Яркий','Добрый','Храбрый','Мудрый'];
    const nou = ['Кот','Волк','Орёл','Лис','Медведь','Тигр','Сова'];
    
    document.getElementById('nameInput').value = adj[Math.floor(Math.random()*adj.length)] + nou[Math.floor(Math.random()*nou.length)];
    document.getElementById('roomInput').value = Math.random().toString(36).slice(2, 8);

    function ts() {
        const d = new Date();
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function addSys(text) {
        const el = document.getElementById('messages');
        const d = document.createElement('div');
        d.className = 'sys-msg';
        d.textContent = text;
        el.appendChild(d);
        el.scrollTop = el.scrollHeight;
    }

    function addMsg(name, text, isMe) {
        const el = document.getElementById('messages');
        const group = document.createElement('div');
        group.className = 'msg-group ' + (isMe ? 'me' : 'them');
        
        if (!isMe) {
            const n = document.createElement('div');
            n.className = 'msg-name';
            n.textContent = name;
            group.appendChild(n);
        }
        
        const b = document.createElement('div');
        b.className = 'bubble ' + (isMe ? 'me' : 'them');
        b.textContent = text;
        group.appendChild(b);
        
        const t = document.createElement('div');
        t.className = 'msg-time';
        t.textContent = ts();
        group.appendChild(t);
        
        el.appendChild(group);
        el.scrollTop = el.scrollHeight;
    }

    function setStatus(state, text) {
        const dot = document.getElementById('dot');
        dot.className = 'dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : '');
        document.getElementById('statusText').textContent = text;
    }

    // WebRTC Functions
    async function startCall(type) {
        if (!client || !currentRoom) {
            addSys('❌ Сначала войдите в комнату!');
            return;
        }
        
        if (isInCall) {
            addSys('❌ Вы уже в звонке!');
            return;
        }
        
        const otherUsers = Array.from(roomUsers.keys()).filter(id => id !== myId);
        if (otherUsers.length === 0) {
            addSys('❌ В комнате нет других пользователей для звонка!');
            return;
        }
        
        const targetUserId = otherUsers[0];
        callType = type;
        currentCallPartner = targetUserId;
        
        try {
            const constraints = type === 'video' 
                ? { video: true, audio: true }
                : { video: false, audio: true };
            
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            if (type === 'video') {
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoToggleBtn').style.display = 'flex';
            }
            
            createPeerConnection();
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            client.publish(currentRoom + '/signal/' + targetUserId, JSON.stringify({
                type: 'offer',
                offer: offer,
                from: myId,
                fromName: myName,
                callType: type
            }), { qos: 1 });
            
            isInCall = true;
            document.getElementById('callModal').classList.add('active');
            addSys(`📞 Инициирован ${type === 'video' ? 'видео' : 'аудио'} звонок...`);
            
        } catch (err) {
            console.error(err);
            addSys('❌ Не удалось получить доступ к микрофону/камере');
        }
    }
    
    function createPeerConnection() {
        if (peerConnection) {
            peerConnection.close();
        }
        
        peerConnection = new RTCPeerConnection(configuration);
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate && currentCallPartner) {
                client.publish(currentRoom + '/signal/' + currentCallPartner, JSON.stringify({
                    type: 'ice',
                    candidate: event.candidate,
                    from: myId
                }), { qos: 1 });
            }
        };
        
        peerConnection.ontrack = (event) => {
            const remoteVideo = document.getElementById('remoteVideo');
            remoteVideo.srcObject = event.streams[0];
            // Убеждаемся, что звук включён
            remoteVideo.volume = 1.0;
            remoteVideo.muted = false;
        };
        
        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                addSys('✅ Звонок установлен!');
            } else if (peerConnection.connectionState === 'disconnected' || 
                       peerConnection.connectionState === 'failed') {
                if (isInCall) {
                    hangUp();
                }
            }
        };
    }
    
    async function acceptCall() {
        if (!pendingCall) return;
        
        document.getElementById('incomingCall').classList.remove('active');
        
        callType = pendingCall.callType;
        currentCallPartner = pendingCall.from;
        
        try {
            const constraints = callType === 'video' 
                ? { video: true, audio: true }
                : { video: false, audio: true };
            
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            if (callType === 'video') {
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoToggleBtn').style.display = 'flex';
            }
            
            createPeerConnection();
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingCall.offer));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            client.publish(currentRoom + '/signal/' + currentCallPartner, JSON.stringify({
                type: 'answer',
                answer: answer,
                from: myId
            }), { qos: 1 });
            
            isInCall = true;
            document.getElementById('callModal').classList.add('active');
            addSys('✅ Звонок начат');
            
        } catch (err) {
            console.error(err);
            addSys('❌ Ошибка при ответе на звонок');
            hangUp();
        }
        
        pendingCall = null;
    }
    
    function rejectCall() {
        if (pendingCall) {
            client.publish(currentRoom + '/signal/' + pendingCall.from, JSON.stringify({
                type: 'reject',
                from: myId
            }), { qos: 1 });
            pendingCall = null;
            document.getElementById('incomingCall').classList.remove('active');
            addSys('📵 Звонок отклонён');
        }
    }
    
    function hangUp() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('callModal').classList.remove('active');
        
        if (isInCall && client && currentRoom && currentCallPartner) {
            client.publish(currentRoom + '/signal/' + currentCallPartner, JSON.stringify({
                type: 'hangup',
                from: myId
            }), { qos: 1 });
        }
        
        isInCall = false;
        currentCallPartner = null;
        pendingCall = null;
        addSys('📞 Звонок завершён');
    }
    
    function toggleMute() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const muteBtn = document.getElementById('muteBtn');
                if (audioTrack.enabled) {
                    muteBtn.classList.remove('active');
                } else {
                    muteBtn.classList.add('active');
                }
            }
        }
    }
    
    function toggleVideo() {
        if (localStream && callType === 'video') {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
            }
        }
    }

    function joinRoom() {
        const rawRoom = document.getElementById('roomInput').value.trim();
        const name = document.getElementById('nameInput').value.trim() || 'Аноним';
        
        if (!rawRoom) {
            alert('Введите ID комнаты!');
            return;
        }
        
        // Очищаем ID комнаты от спецсимволов
        const cleanRoom = rawRoom.replace(/[^a-zA-Z0-9\-_]/g, '');
        if (!cleanRoom) {
            alert('ID комнаты содержит недопустимые символы!');
            return;
        }
        
        myName = name;
        currentRoom = 'msg_v1/' + cleanRoom;
        
        document.getElementById('headerTitle').textContent = 'Комната: ' + cleanRoom;
        document.getElementById('hintRoom').textContent = cleanRoom;
        document.getElementById('roomHint').classList.add('visible');
        
        setStatus('', 'Подключение...');
        
        if (client) {
            try {
                client.end(true);
            } catch(e) {}
            client = null;
        }
        
        // Список брокеров MQTT
        const brokers = [
            'wss://broker.hivemq.com:8884/mqtt',
            'wss://test.mosquitto.org:8081/mqtt',
            'wss://mqtt.eclipseprojects.io:443/mqtt'
        ];
        
        let brokerIndex = 0;
        
        function connectToBroker() {
            if (brokerIndex >= brokers.length) {
                setStatus('err', 'Ошибка подключения');
                addSys('❌ Не удалось подключиться ни к одному MQTT брокеру');
                return;
            }
            
            const brokerUrl = brokers[brokerIndex];
            setStatus('', 'Подключение к ' + brokerUrl.replace('wss://', '') + '...');
            
            const mqttClient = mqtt.connect(brokerUrl, {
                clientId: 'web_' + myId + '_' + Date.now(),
                clean: true,
                connectTimeout: 10000,
                reconnectPeriod: 0
            });
            
            const timeout = setTimeout(() => {
                mqttClient.end(true);
                brokerIndex++;
                connectToBroker();
            }, 10000);
            
            mqttClient.on('connect', () => {
                clearTimeout(timeout);
                client = mqttClient;
                setStatus('on', 'Подключено • ' + myName);
                
                // Подписываемся на темы
                client.subscribe(currentRoom + '/msg', { qos: 0 });
                client.subscribe(currentRoom + '/sys', { qos: 0 });
                client.subscribe(currentRoom + '/signal/+', { qos: 0 });
                
                document.getElementById('msgInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Сменить';
                document.getElementById('msgInput').focus();
                
                // Отправляем сообщение о входе
                client.publish(currentRoom + '/sys', JSON.stringify({
                    id: myId,
                    name: myName,
                    action: 'join'
                }), { qos: 0 });
                
                addSys('✅ Вы вошли как "' + myName + '"');
                addSys('📋 ID комнаты: ' + cleanRoom);
                addSys('👥 Отправьте этот ID собеседнику, чтобы общаться');
            });
            
            mqttClient.on('message', (topic, payload) => {
                try {
                    const message = JSON.parse(payload.toString());
                    
                    if (topic.endsWith('/msg')) {
                        if (message.id === myId) return;
                        addMsg(message.name, message.text, false);
                    }
                    else if (topic.endsWith('/sys')) {
                        if (message.id === myId) return;
                        
                        if (message.action === 'join') {
                            roomUsers.set(message.id, { name: message.name, lastSeen: Date.now() });
                            addSys('👤 ' + message.name + ' вошёл(а) в комнату');
                        }
                        else if (message.action === 'leave') {
                            roomUsers.delete(message.id);
                            addSys('👤 ' + message.name + ' покинул(а) комнату');
                            
                            if (currentCallPartner === message.id && isInCall) {
                                hangUp();
                                addSys('🔴 Собеседник покинул комнату');
                            }
                        }
                    }
                    else if (topic.includes('/signal/')) {
                        const parts = topic.split('/');
                        const targetId = parts[parts.length - 1];
                        
                        if (message.type === 'offer' && !isInCall && !pendingCall && message.from !== myId) {
                            pendingCall = message;
                            document.getElementById('callerName').textContent = message.fromName;
                            document.getElementById('incomingCall').classList.add('active');
                            addSys(`📞 Входящий ${message.callType === 'video' ? 'видео' : 'аудио'} звонок от ${message.fromName}`);
                        }
                        else if (message.type === 'answer' && peerConnection && currentCallPartner === message.from) {
                            peerConnection.setRemoteDescription(new RTCSessionDescription(message.answer));
                        }
                        else if (message.type === 'ice' && peerConnection && currentCallPartner === message.from) {
                            peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
                        }
                        else if (message.type === 'reject') {
                            addSys('📵 Звонок отклонён собеседником');
                            hangUp();
                        }
                        else if (message.type === 'hangup') {
                            addSys('🔴 Собеседник завершил звонок');
                            hangUp();
                        }
                    }
                } catch(e) {
                    console.error('Ошибка обработки сообщения:', e);
                }
            });
            
            mqttClient.on('error', (err) => {
                console.error('MQTT ошибка:', err);
                clearTimeout(timeout);
                mqttClient.end(true);
                brokerIndex++;
                connectToBroker();
            });
            
            mqttClient.on('close', () => {
                if (client === mqttClient) {
                    setStatus('err', 'Соединение разорвано');
                    document.getElementById('msgInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }
            });
        }
        
        connectToBroker();
    }

    function sendMsg() {
        if (!client || !currentRoom) return;
        
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;
        
        client.publish(currentRoom + '/msg', JSON.stringify({
            id: myId,
            name: myName,
            text: text
        }), { qos: 0 });
        
        addMsg(myName, text, true);
        input.value = '';
        input.style.height = 'auto';
    }

    function copyRoom() {
        const id = document.getElementById('roomInput').value.trim();
        navigator.clipboard.writeText(id).then(() => {
            const btn = document.querySelector('.copy-btn');
            const orig = btn.textContent;
            btn.textContent = '✓ скопировано!';
            setTimeout(() => btn.textContent = orig, 2000);
        });
    }

    function insertEmoji(e) {
        const input = document.getElementById('msgInput');
        if (input.disabled) return;
        
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.slice(0, start) + e + input.value.slice(end);
        input.selectionStart = input.selectionEnd = start + e.length;
        input.focus();
    }

    // Обработчики событий
    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });
    
    document.getElementById('msgInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    document.getElementById('joinBtn').addEventListener('click', () => joinRoom());
    
    document.getElementById('roomInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') joinRoom();
    });
    
    window.addEventListener('beforeunload', () => {
        if (client && currentRoom) {
            try {
                client.publish(currentRoom + '/sys', JSON.stringify({
                    id: myId,
                    name: myName,
                    action: 'leave'
                }), { qos: 0 });
                client.end(true);
            } catch(e) {}
        }
    });
    
    // Инициализация: автоматически генерируем имя и комнату
    console.log('Мессенджер загружен! Нажмите "Войти" для подключения');
</script>
